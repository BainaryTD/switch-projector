<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Display</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        #holdScreen {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=1470&auto=format&fit=crop') center/cover;
            position: absolute;
            z-index: 10;
            color: white;
            flex-direction: column;
            transition: opacity 0.3s;
        }

        #holdText {
            font-size: 3rem;
            font-weight: bold;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.8);
        }

        #videoPlayer,
        #imagePlayer {
            width: 100%;
            height: 100%;
            display: none;
            background: #000;
            position: absolute;
            z-index: 5;
            object-fit: contain;
        }
    </style>
</head>

<body>
    <div id="holdScreen">
        <div id="holdText">Projector App Standby 💤</div>
    </div>
    <video id="videoPlayer"></video>
    <img id="imagePlayer" style="display: none;" />
    <script src="display.js"></script>
</body>

</html>
